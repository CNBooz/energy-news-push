name: 能源电力要闻推送

on:
  workflow_dispatch:        # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate news and send email
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QQ_EMAIL_ACCOUNT: ${{ secrets.QQ_EMAIL_ACCOUNT }}
          QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
        run: |
          cd scripts
          python energy_news.py

      - name: Upload to IMA Knowledge Base
        if: success()
        env:
          IMA_API_KEY: ${{ secrets.IMA_API_KEY }}
        run: |
          cd scripts
          if [ -f "energy_news.md" ]; then
            echo "Found energy_news.md, uploading to IMA..."
            python ima_uploader.py energy_news.md
          else
            echo "ERROR: energy_news.md not found!"
            ls -la
            exit 1
          fi

      - name: Debug - List files
        if: always()
        run: |
          echo "=== Workspace files ==="
          ls -la scripts/
          echo "=== Check Markdown ==="
          head -5 scripts/energy_news.md 2>/dev/null || echo "No MD file"
