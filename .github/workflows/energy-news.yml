name: 能源电力要闻推送

on:
  schedule:
    - cron: '0 12 * * *'  # 北京时间 20:00 = UTC 12:00
  workflow_dispatch:        # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate news and send email
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QQ_EMAIL_ACCOUNT: ${{ secrets.QQ_EMAIL_ACCOUNT }}
          QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
        run: |
          cd scripts
          python energy_news.py

      - name: Upload HTML to IMA Knowledge Base
        if: success()
        env:
          IMA_CLIENT_ID: ${{ secrets.IMA_CLIENT_ID }}
          IMA_API_KEY: ${{ secrets.IMA_API_KEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
        run: |
          cd scripts
          # 检查 HTML 文件是否存在
          if [ -f "energy_news.html" ]; then
            echo "Found energy_news.html, uploading to IMA..."
            node ima_api.cjs
          else
            echo "No HTML file found, skipping IMA upload"
            ls -la
          fi

      - name: Debug - List files
        if: always()
        run: |
          echo "=== Workspace files ==="
          ls -la scripts/
          echo "=== Check HTML ==="
          cat scripts/energy_news.html 2>/dev/null || echo "No HTML file"